name: encatch_flutter
description: Encatch Flutter SDK for in-app feedback and survey collection. Full feature parity with the Encatch React Native SDK.
version: 1.0.0
homepage: https://encatch.com
repository: https://github.com/get-encatch/flutter-sdk
issue_tracker: https://github.com/get-encatch/flutter-sdk/issues
topics:
  - feedback
  - survey
  - analytics

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  device_info_plus: ">=12.3.0 <14.0.0"
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  http: ^1.2.2
  http_parser: ^4.0.0
  package_info_plus: ">=9.0.0 <11.0.0"
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  # No assets or fonts needed — forms are rendered in a WebView
